<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MZ Driver">
  <meta name="theme-color" content="#0D1240">
  <title>Driver App — Mendez Transportation</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/driver.css">
</head>
<body class="driver-body">

  <!-- ── HEADER ── -->
  <header class="dr-header">
    <div class="dr-header-top">
      <div class="dr-brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        <span class="dr-brand-name">Mendez Driver</span>
      </div>
      <button class="dr-logout" onclick="driverLogout()">Sign Out</button>
    </div>
    <div class="dr-driver-info">
      <div class="dr-avatar" id="driverAvatar">—</div>
      <div>
        <div class="dr-driver-name" id="driverName">Loading…</div>
        <div class="dr-driver-meta" id="driverMeta"><span class="dr-online-dot"></span>On duty</div>
      </div>
    </div>
  </header>

  <!-- ── DATE BAR ── -->
  <div class="dr-date-bar">
    <span class="dr-date" id="dateLabel">—</span>
    <span class="dr-trip-count" id="tripCount">—</span>
  </div>

  <!-- ── LOCATION STATUS ── -->
  <div class="dr-location-bar" id="locationBar" style="display:none" onclick="retryLocation()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
    </svg>
    <span id="locationText">Requesting location…</span>
  </div>

  <!-- ── CABIN CAMERA ── -->
  <div class="dr-camera-bar off" id="cameraBar">
    <div class="dr-camera-bar-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span class="dr-camera-bar-text" id="cameraText">Cabin camera off</span>
      <button class="dr-camera-toggle" id="cameraToggle" onclick="toggleCabinCamera()">Enable</button>
    </div>
    <video class="dr-camera-preview" id="cabinVideo" autoplay playsinline muted style="display:none"></video>
  </div>

  <!-- ── LOADING ── -->
  <div class="dr-loading" id="loading">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12a9 9 0 11-6.219-8.56"/>
    </svg>
    Loading your trips…
  </div>

  <!-- ── TRIP LIST ── -->
  <div class="dr-trips" id="tripList" style="display:none"></div>

  <!-- ── INSTALL PROMPT ── -->
  <div class="dr-install-bar" id="installBar" style="display:none">
    <div class="dr-install-text">
      <strong>Add to Home Screen</strong>
      Open Mendez Driver like an app
    </div>
    <div class="dr-install-actions">
      <button class="dr-install-btn dismiss" onclick="dismissInstall()">Later</button>
      <button class="dr-install-btn accept" onclick="acceptInstall()">Install</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="js/driver.js"></script>
</body>
</html>
